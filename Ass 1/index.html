  <h2> Welcome! </h2>
  <p> This page is dedicated to the gray merchant, a card from MTG. </p>

  <img src="Images/gary-theros.jpg" alt="Gray Merchant of Asphodel" class="home-gary">

  <footer>
  <form action="" method="post">
    <legend> For futher questions contact us! </legend>
    <dl>
      <dt> <label for="firstname"> First Name: </label> </dt>
      <dd>
        <input type="text" name="firstname" autofocus>
      </dd>
    </dl>
    <dl>
      <dt> <label for="lastname"> Last Name: </label> </dt>
      <dd>
        <input type="text" name="lastname">
      </dd>
    </dl>
    <dl>
      <dt> <label for="email"> Email: </label> </dt>
      <dd>
        <input type="text" name="email" pattern="[A-Za-z0-9]+@[A-Za-z]+\.[A-Za-z]+" placeholder="johndoe@example.com">
      </dd>
    </dl>
    <dl>
      <dt> <label for="phone"> Phone number: </label> </dt>
      <dd>
        <input type="text" name="phone" pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}" placeholder="123-123-1234">
      </dd>
    </dl>
    <dl>  
      <dt> <label for="subject"> Subject </label> </dt>
      <dd>
        <input type="text" class="subject" name="subject">
      </dd>
    </dl>
    <dl>
      <dt> <label for="body"> Body </label> </dt>
      <dd> <input type="text" class="body" name="body"> </dd>
    </dl>
    <dl>
      <dt> <label for="terms"> Have you read our terms and conditions? </label> </dt>
      <dd>
        <input type="radio" name="terms"> Yes </input>
        <input type="radio" name="terms"> No </input>
      </dd>
    </dl>
    <dl>
      <dt> <label for="mc"> How did you hear about us? </label> </dt>
      <dd>
        <input type="checkbox"> Friends </input>
        <input type="checkbox"> Advertisemnet </input> 
        <input type="checkbox"> Other </input>
      </dd>
    </dl>
  </form>
  </footer>

</body>


</html>
