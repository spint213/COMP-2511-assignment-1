  <form action="mailto:spint213@mtroyal.ca" method="post">
    <fieldset>
      <legend> For futher questions contact us! </legend>
      <dl>
        <dt> <label for="firstname"> First Name: </label> </dt>
        <dd>
          <input type="text" id="firstname" required autofocus>
        </dd>
      </dl>
      <dl>
        <dt> <label for="lastname"> Last Name: </label> </dt>
        <dd>
          <input type="text" id="lastname">
        </dd>
      </dl>
      <dl>
        <dt> <label for="email"> Email: </label> </dt>
        <dd>
          <input type="text" id="email" pattern="[A-Za-z0-9]+@[A-Za-z]+\.[A-Za-z]+" placeholder="johndoe@example.com" required>
        </dd>
      </dl>
      <dl>
        <dt> <label for="phone"> Phone number: </label> </dt>
        <dd>
          <input type="text" id="phone" pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}" placeholder="123-123-1234" required>
        </dd>
      </dl>
      <dl>  
        <dt> <label for="subject"> Subject </label> </dt>
        <dd>
          <input type="text" class="subject" id="subject">
        </dd>
      </dl>
      <dl>
        <dt> <label for="body"> Body </label> </dt>
        <dd> <input type="text" class="body" id="body"> </dd>
      </dl>
      <dl>
        <dt> <label for="terms"> Have you read our terms and conditions? </label> </dt>
        <dd>
          <input type="radio" id="terms"> Yes 
          <input type="radio" id="terms"> No 
        </dd>
      </dl>
      <dl>
        <dt> <label for="mc"> How did you hear about us? </label> </dt>
        <dd>
          <input type="checkbox" id="mc"> Friends 
          <input type="checkbox" id="mc"> Advertisemnet 
          <input type="checkbox" id="mc"> Other 
        </dd>
      </dl>
        <input type="submit">
        <input type="reset">
    </fieldset>
